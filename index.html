<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة باي الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="p-4">
    <h1 class="text-2xl font-bold text-center mb-4">مكتبة باي الرقمية</h1>
    
    <!-- شريط حالة التوثيق الذكي للكشف عن الاتصال فوراً -->
    <div id="authStatus" class="text-center p-3 mb-6 rounded-lg text-sm bg-yellow-900 text-yellow-300 font-bold animate-pulse">
        جاري الاتصال بشبكة باي وتأكيد الصلاحيات...
    </div>

    <div id="booksGrid" class="grid grid-cols-2 gap-4"></div>

    <div id="bookModal" class="fixed inset-0 bg-black bg-opacity-90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-sm text-center">
            <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
            <p id="modalAuthor" class="text-gray-400 mb-6"></p>
            <button id="buyButton" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg mb-2">شراء وتحميل</button>
            <button onclick="closeModal()" class="w-full text-gray-400 py-2">إلغاء</button>
        </div>
    </div>

    <script>
        const APP_ID = "digital-library-fc6a5a2b23afc76b";
        
        // تهيئة الـ SDK فوراً عند تحميل الملف
        if (window.Pi) {
            try {
                window.Pi.init({ version: "2.0", sandbox: true });
            } catch (e) {
                console.error("فشلت التهيئة المبدئية:", e);
            }
        }

        // دالة التوثيق وتسجيل الدخول
        async function authPiUser() {
            const statusDiv = document.getElementById('authStatus');
            if (!window.Pi) {
                statusDiv.innerText = "خطأ: لم يتم تحميل ملفات Pi SDK الخارجية.";
                statusDiv.className = "text-center p-3 mb-6 rounded-lg text-sm bg-red-900 text-red-300 font-bold";
                return;
            }
            
            try {
                const scopes = ['username', 'payments'];
                // استدعاء التوثيق الرسمي
                const authResult = await window.Pi.authenticate(scopes, function(payment) {
                    // معالجة المدفوعات المعلقة إن وجدت
                    fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                    });
                });
                
                // إذا نجح التوثيق يتغير الشريط للون الأخضر ويظهر اسم المستخدم
                statusDiv.innerText = `🟢 متصل بنجاح كـ مطور: ${authResult.user.username}`;
                statusDiv.className = "text-center p-3 mb-6 rounded-lg text-sm bg-green-950 text-green-400 font-bold";
            } catch (err) {
                // إذا فشل يظهر السبب مباشرة في الشريط الأحمر
                statusDiv.innerText = `🔴 فشل منح صلاحية الدفع. السبب: ${err.message || err}\n(تأكد من فتح الرابط المباشر ومطابقته في develop.pi)`;
                statusDiv.className = "text-center p-3 mb-6 rounded-lg text-sm bg-red-950 text-red-400 font-bold";
            }
        }

        const books = [
            { id: 1, title: "الرحيق المختوم", author: "صفي الرحمن", icon: "🕌" },
            { id: 2, title: "مقدمة ابن خلدون", author: "ابن خلدون", icon: "🏛️" },
            { id: 3, title: "ثروة الأمم", author: "آدم سميث", icon: "📈" },
            { id: 4, title: "الخيميائي", author: "باولو كويلو", icon: "✨" },
            { id: 5, title: "شيفرة دافنشي", author: "دان براون", icon: "🕵️" },
            { id: 6, title: "تاريخ موجز للزمن", author: "ستيفن هوكينغ", icon: "🔬" },
            { id: 7, title: "الكون", author: "كارل ساغان", icon: "🌌" },
            { id: 8, title: "عشرون ألف فرسخ", author: "جول فيرن", icon: "🌊" },
            { id: 9, title: "جدد حياتك", author: "محمد الغزالي", icon: "📖" },
            { id: 10, title: "الاقتصاد العجيب", author: "ستيفن ليفيت", icon: "📊" }
        ];

        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            if (grid) {
                grid.innerHTML = books.map(book => `
                    <div onclick="openModal(${book.id})" class="bg-slate-800 p-4 rounded-lg text-center cursor-pointer hover:bg-slate-700 transition">
                        <div class="text-4xl mb-2">${book.icon}</div>
                        <p class="font-bold text-sm">${book.title}</p>
                    </div>
                `).join('');
            }
        }

        function openModal(id) {
            const book = books.find(b => b.id === id);
            document.getElementById('modalTitle').innerText = book.title;
            document.getElementById('modalAuthor').innerText = book.author;
            
            document.getElementById('buyButton').onclick = async () => {
                try {
                    await window.Pi.createPayment({
                        amount: 1,
                        memo: "شراء كتاب: " + book.title,
                        metadata: { bookId: id }
                    }, {
                        onReadyForServerApproval: (paymentId) => {
                            return fetch('/api/approve', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId })
                            }).then(res => {
                                if (!res.ok) throw new Error("السيرفر رفض الموافقة - كود الخطأ: " + res.status);
                                return res.json();
                            });
                        },
                        onReadyForServerCompletion: (paymentId, txid) => {
                            return fetch('/api/complete', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId, txid })
                            }).then(res => {
                                if (res.ok) {
                                    alert("تمت العملية بنجاح! تم تأكيد الدفع.");
                                    closeModal();
                                } else {
                                    alert("فشل السيرفر في التأكيد النهائي المعاملة.");
                                }
                                return res.json();
                            });
                        },
                        onCancel: () => alert("تم إلغاء عملية الدفع"),
                        onError: (e) => alert("خطأ من الـ Pi SDK: " + e.message)
                    });
                } catch (e) { 
                    alert("عذراً، لا يمكن الدفع حالياً: " + e.message); 
                }
            };
            document.getElementById('bookModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('bookModal').classList.add('hidden'); }
        
        window.onload = () => {
            renderBooks();
            authPiUser();
        };
    </script>
</body>
</html>
