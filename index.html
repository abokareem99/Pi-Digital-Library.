<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة باي الرقمية</title>
    
    <!-- تضمين مكتبة Pi Network SDK الرسمية -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d1624; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px; 
        }

        .app-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff;
        }

        /* شريط حالة الاتصال المتغير حسب الحالة */
        .status-bar {
            background-color: #1a2436;
            border: 1px solid #2c3a50;
            color: #a0aec0;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer; /* جعل الشريط قابلاً للضغط لإعادة المحاولة */
        }

        /* حالة النجاح الأخضر المأخوذة من صورتك الأصلية */
        .status-bar.connected {
            background-color: #063116;
            border: 1px solid #0b5025;
            color: #2ecc71;
            cursor: default;
        }

        /* حالة الفشل باللون الأحمر الخفيف والتنبيهي */
        .status-bar.failed {
            background-color: #3c1e1e;
            border: 1px solid #632525;
            color: #e74c3c;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #7f8c8d;
            border-radius: 50%;
            display: inline-block;
        }

        .status-bar.connected .status-dot {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        .status-bar.failed .status-dot {
            background-color: #e74c3c;
            box-shadow: 0 0 8px #e74c3c;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .book-card {
            background-color: #1a2436;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
            border: 1px solid transparent;
        }

        .book-card:hover {
            background-color: #222f46;
            transform: scale(1.02);
        }

        .book-icon {
            font-size: 36px;
            margin-bottom: 12px;
            display: block;
        }

        .book-name {
            font-size: 15px;
            font-weight: bold;
            color: #e0e6ed;
            line-height: 1.4;
        }

        /* نافذة نجاح العملية */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-box {
            background-color: #09111e;
            border: 2px solid #11233b;
            border-radius: 16px;
            width: 100%;
            max-width: 340px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .success-circle {
            width: 70px;
            height: 70px;
            border: 3px solid #00a86b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            color: #00a86b;
            font-size: 32px;
            font-weight: bold;
            background-color: rgba(0, 168, 107, 0.05);
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .modal-text {
            font-size: 14px;
            color: #a0aec0;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-success {
            background-color: #00a86b;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-success:hover {
            background-color: #008f5d;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1 class="app-title">مكتبة باي الرقمية</h1>

        <!-- عند حدوث فشل، يمكن للمستخدم الضغط على الشريط مجدداً لإعادة المحاولة يدويًا -->
        <div class="status-bar" id="auth-status-bar" onclick="authenticateUser()">
            <span class="status-dot"></span>
            <span id="status-text">جاري الاتصال بشبكة باي...</span>
        </div>

        <div class="books-grid">
            <div class="book-card" onclick="startPurchase('raheeq', 1.0, 'كتاب الرحيق المختوم')">
                <span class="book-icon">🕌</span>
                <span class="book-name">الرحيق المختوم</span>
            </div>

            <div class="book-card" onclick="startPurchase('khaldoun', 1.0, 'مقدمة ابن خلدون')">
                <span class="book-icon">🏛️</span>
                <span class="book-name">مقدمة ابن خلدون</span>
            </div>

            <div class="book-card" onclick="startPurchase('nations', 1.0, 'ثروة الأمم')">
                <span class="book-icon">📈</span>
                <span class="book-name">ثروة الأمم</span>
            </div>

            <div class="book-card" onclick="startPurchase('alchemist', 1.0, 'الخيميائي')">
                <span class="book-icon">✨</span>
                <span class="book-name">الخيميائي</span>
            </div>

            <div class="book-card" onclick="startPurchase('davinci', 1.0, 'شيفرة دافنشي')">
                <span class="book-icon">🕵️</span>
                <span class="book-name">شيفرة دافنشي</span>
            </div>

            <div class="book-card" onclick="startPurchase('time', 1.0, 'تاريخ موجز للزمن')">
                <span class="book-icon">🔬</span>
                <span class="book-name">تاريخ موجز للزمن</span>
            </div>

            <div class="book-card" onclick="startPurchase('universe', 1.0, 'الكون')">
                <span class="book-icon">🌌</span>
                <span class="book-name">الكون</span>
            </div>

            <div class="book-card" onclick="startPurchase('leagues', 1.0, 'عشرون ألف فرسخ')">
                <span class="book-icon">🌊</span>
                <span class="book-name">عشرون ألف فرسخ</span>
            </div>

            <div class="book-card" onclick="startPurchase('life', 1.0, 'جدد حياتك')">
                <span class="book-icon">📖</span>
                <span class="book-name">جدد حياتك</span>
            </div>

            <div class="book-card" onclick="startPurchase('economy', 1.0, 'الاقتصاد العجيب')">
                <span class="book-icon">📊</span>
                <span class="book-name">الاقتصاد العجيب</span>
            </div>
        </div>
    </div>

    <!-- النافذة المنبثقة لنجاح الشراء -->
    <div class="modal-overlay" id="success-modal">
        <div class="modal-box">
            <div class="success-circle">✓</div>
            <h3 class="modal-title">نجاح العملية</h3>
            <p class="modal-text">🎉 تمت العملية بنجاح تام!<br>تم تأكيد وشراء الكتاب بنجاح عبر شبكة باي.</p>
            <button class="btn-success" id="btn-read-now">ممتاز</button>
        </div>
    </div>

    <script>
        const Pi = window.Pi;
        
        // إعداد متغيرات التحكم
        let isUserAuthenticated = false;
        let currentPuchasedUrl = "";
        let currentPurchasedTitle = "";

        // بدء تهيئة المكتبة الرسمية
        try {
            Pi.init({ version: "2.0", sandbox: true }); // اجعلها false عند النشر الفعلي على الماينت
        } catch(e) {
            console.error("خطأ أثناء تهيئة الـ SDK:", e);
        }

        // دالة تسجيل الدخول وربط الحساب بالمحفظة
        function authenticateUser() {
            // إذا كان المستخدم متصلاً بالفعل، لا تفعل شيئاً عند الضغط
            if (isUserAuthenticated) return;

            const statusBar = document.getElementById('auth-status-bar');
            statusBar.className = "status-bar"; // إعادة تعيين التنسيق الافتراضي الرمادي
            document.getElementById('status-text').innerText = "جاري الاتصال والتحقق...";

            // بدء طلب المصادقة الرسمي من متصفح باي
            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
            .then(function(auth) {
                isUserAuthenticated = true;
                statusBar.className = "status-bar connected"; // تحويل الشريط للأخضر الأصلي المعتمد
                document.getElementById('status-text').innerText = "متصل بنجاح: " + auth.user.username;
            })
            .catch(function(error) {
                console.error("خطأ المصادقة:", error);
                statusBar.className = "status-bar failed"; // تحويل الشريط للون التنبيهي الأحمر
                document.getElementById('status-text').innerText = "فشل الاتصال: يرجى فتح التطبيق من متصفح Pi (اضغط للإعادة)";
            });
        }

        // معالجة وإغلاق العمليات المعلقة تلقائياً (شرط أساسي لـ Pi)
        function onIncompletePaymentFound(payment) {
            console.log("تم العثور على معالجة دفع غير مكتملة، جاري إنهائها...");
            fetch('/api/complete-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
            });
        }

        // إعطاء مهلة بسيطة (نصف ثانية) للمتصفح حتى تكتمل تهيئة الـ SDK قبل طلب الاتصال التلقائي
        window.onload = function() {
            setTimeout(authenticateUser, 500);
        };

        // دالة إنشاء عملية الدفع والشراء عند ضغط أي كتاب
        function startPurchase(bookId, amount, bookTitle) {
            if (!isUserAuthenticated) {
                alert("يرجى التأكد من اتصال حسابك بشبكة باي أولاً بالضغط على شريط الحالة العلوي.");
                return;
            }

            Pi.createPayment({
                amount: amount,
                memo: "شراء وتصفح " + bookTitle,
                metadata: { bookId: bookId }
            }, {
                // خطوة إرسال المعاملة للسيرفر للموافقة (Approve)
                onReadyForServerApproval: function(paymentId) {
                    fetch('/api/approve-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId })
                    });
                },
                // خطوة الخصم النهائي والتأكيد من السيرفر (Complete)
                onReadyForServerCompletion: function(paymentId, txid) {
                    fetch('/api/complete-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(data => {
                        const baseDomain = window.location.origin;
                        // تركيب الرابط التلقائي بناءً على معرّف الكتاب المختار
                        currentPuchasedUrl = baseDomain + "/api_eq_al_makhtoom/" + bookId + ".pdf"; 
                        currentPurchasedTitle = bookTitle;

                        // فتح نافذة النجاح الخضراء
                        document.getElementById('success-modal').style.display = 'flex';
                    });
                },
                onCancel: function(paymentId) {
                    console.log("تم إلغاء الدفع.");
                },
                onError: function(error, payment) {
                    alert("عذراً، حدث خطأ أثناء عملية الدفع: " + error.message);
                }
            });
        }

        // التوجيه للملف المنفصل تصفح الكتاب بالكامل فور الضغط على ممتاز
        document.getElementById('btn-read-now').addEventListener('click', function() {
            if(currentPuchasedUrl) {
                window.location.href = "/viewer.html?file=" + encodeURIComponent(currentPuchasedUrl) + "&title=" + encodeURIComponent(currentPurchasedTitle);
            }
        });
    </script>
</body>
</html>
