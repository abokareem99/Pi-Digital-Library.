<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مكتبة باي الرقمية</title>
    <!-- استيراد مكتبة Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>مكتبة باي الرقمية</h1>
    <button id="pay-button">شراء الكتاب بـ 1 Pi</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0" });

        document.getElementById('pay-button').addEventListener('click', async () => {
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "شراء كتاب من مكتبة باي",
                    metadata: { bookId: "123" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("جاهز للموافقة:", paymentId);
                        // هنا سيتم إرسال الـ paymentId لخادمك
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        console.log("اكتمل الدفع:", txid);
                    },
                    onCancel: (paymentId) => {
                        alert("تم إلغاء عملية الدفع");
                    },
                    onError: (error, payment) => {
                        alert("حدث خطأ: " + error);
                    }
                });
            } catch (err) {
                console.error("خطأ في الاتصال:", err);
            }
        });
    </script>
</body>
</html>
