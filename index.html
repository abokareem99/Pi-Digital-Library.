<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة باي الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="p-4">
    <h1 class="text-2xl font-bold text-center mb-8">مكتبة باي الرقمية</h1>
    <div id="booksGrid" class="grid grid-cols-2 gap-4"></div>

    <div id="bookModal" class="fixed inset-0 bg-black bg-opacity-90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-sm text-center">
            <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
            <p id="modalAuthor" class="text-gray-400 mb-6"></p>
            <button id="buyButton" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg mb-2">شراء وتحميل</button>
            <button onclick="closeModal()" class="w-full text-gray-400 py-2">إلغاء</button>
        </div>
    </div>

    <script>
        const APP_ID = "digital-library-fc6a5a2b23afc76b";
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // دالة لتوثيق دخول المستخدم تلقائياً عند فتح التطبيق
        async function authPiUser() {
            try {
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) {
                    // إذا وُجدت معاملة معلقة، يتم إرسالها لملف الـ complete لإغلاقها
                    fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                    });
                }
                await Pi.authenticate(scopes, onIncompletePaymentFound);
                console.log("تم تسجيل دخول المستخدم بنجاح في شبكة باي");
            } catch (err) {
                console.error("خطأ في التوثيق:", err);
            }
        }

        const books = [
            { id: 1, title: "الرحيق المختوم", author: "صفي الرحمن", icon: "🕌" },
            { id: 2, title: "مقدمة ابن خلدون", author: "ابن خلدون", icon: "🏛️" },
            { id: 3, title: "ثروة الأمم", author: "آدم سميث", icon: "📈" },
            { id: 4, title: "الخيميائي", author: "باولو كويلو", icon: "✨" },
            { id: 5, title: "شيفرة دافنشي", author: "دان براون", icon: "🕵️" },
            { id: 6, title: "تاريخ موجز للزمن", author: "ستيفن هوكينغ", icon: "🔬" },
            { id: 7, title: "الكون", author: "كارل ساغان", icon: "🌌" },
            { id: 8, title: "عشرون ألف فرسخ", author: "جول فيرن", icon: "🌊" },
            { id: 9, title: "جدد حياتك", author: "محمد الغزالي", icon: "📖" },
            { id: 10, title: "الاقتصاد العجيب", author: "ستيفن ليفيت", icon: "📊" }
        ];

        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = books.map(book => `
                <div onclick="openModal(${book.id})" class="bg-slate-800 p-4 rounded-lg text-center cursor-pointer hover:bg-slate-700 transition">
                    <div class="text-4xl mb-2">${book.icon}</div>
                    <p class="font-bold text-sm">${book.title}</p>
                </div>
            `).join('');
        }

        function openModal(id) {
            const book = books.find(b => b.id === id);
            document.getElementById('modalTitle').innerText = book.title;
            document.getElementById('modalAuthor').innerText = book.author;
            
            document.getElementById('buyButton').onclick = async () => {
                try {
                    await Pi.createPayment({
                        amount: 1,
                        memo: "شراء كتاب: " + book.title,
                        metadata: { bookId: id }
                    }, {
                        // تعديل: إضافة return وإرجاع الاستجابة للسيرفر الرئيسي لشبكة باي
                        onReadyForServerApproval: (paymentId) => {
                            return fetch('/api/approve', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId })
                            }).then(res => {
                                if (!res.ok) throw new Error("فشلت موافقة السيرفر");
                                return res.json();
                            });
                        },
                        // تعديل: إضافة return للتأكيد النهائي وإظهار التنبيه للمستخدم بعد النجاح
                        onReadyForServerCompletion: (paymentId, txid) => {
                            return fetch('/api/complete', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId, txid })
                            }).then(res => {
                                if (res.ok) {
                                    alert("تمت العملية بنجاح! تم تأكيد الدفع وشراء الكتاب.");
                                    closeModal();
                                } else {
                                    alert("فشل تأكيد عملية الدفع النهائية.");
                                }
                                return res.json();
                            });
                        },
                        onCancel: () => alert("تم إلغاء الدفع"),
                        onError: (e) => alert("خطأ: " + e.message)
                    });
                } catch (e) { alert("تأكد أنك تستخدم متصفح Pi Browser"); }
            };
            document.getElementById('bookModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('bookModal').classList.add('hidden'); }
        
        // تشغيل عرض الكتب وتوثيق الحساب فور تحميل الصفحة
        window.onload = () => {
            renderBooks();
            authPiUser();
        };
    </script>
</body>
</html>
