<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة باي الرقمية</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d1624; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px; 
        }

        .app-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .status-bar {
            background-color: #1a2436;
            border: 1px solid #2c3a50;
            color: #a0aec0;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .status-bar.connected {
            background-color: #063116;
            border: 1px solid #0b5025;
            color: #2ecc71;
            cursor: default;
        }

        .status-bar.failed {
            background-color: #3c1e1e;
            border: 1px solid #632525;
            color: #e74c3c;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #7f8c8d;
            border-radius: 50%;
            display: inline-block;
        }

        .status-bar.connected .status-dot {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        .status-bar.failed .status-dot {
            background-color: #e74c3c;
            box-shadow: 0 0 8px #e74c3c;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .book-card {
            background-color: #1a2436;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
            border: 1px solid transparent;
        }

        .book-card:hover {
            background-color: #222f46;
            transform: scale(1.02);
        }

        .book-icon {
            font-size: 36px;
            margin-bottom: 12px;
            display: block;
        }

        .book-name {
            font-size: 15px;
            font-weight: bold;
            color: #e0e6ed;
            line-height: 1.4;
        }

        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-box {
            background-color: #09111e;
            border: 2px solid #11233b;
            border-radius: 16px;
            width: 100%;
            max-width: 340px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .success-circle {
            width: 70px;
            height: 70px;
            border: 3px solid #00a86b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            color: #00a86b;
            font-size: 32px;
            font-weight: bold;
            background-color: rgba(0, 168, 107, 0.05);
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .modal-text {
            font-size: 14px;
            color: #a0aec0;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-success {
            background-color: #00a86b;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-success:hover {
            background-color: #008f5d;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1 class="app-title">مكتبة باي الرقمية</h1>

        <div class="status-bar" id="auth-status-bar" onclick="authenticateUser()">
            <span class="status-dot"></span>
            <span id="status-text">جاري فحص الاتصال بالحساب...</span>
        </div>

        <div class="books-grid" id="books-container"></div>
    </div>

    <div class="modal-overlay" id="success-modal">
        <div class="modal-box">
            <div class="success-circle">✓</div>
            <h3 class="modal-title">نجاح العملية</h3>
            <p class="modal-text">🎉 تمت العملية بنجاح تام!<br>تم تأكيد وشراء الكتاب بنجاح عبر شبكة باي.</p>
            <button class="btn-success" id="btn-read-now">قراءة الكتاب الآن</button>
        </div>
    </div>

    <script>
        const Pi = window.Pi;
        let isUserAuthenticated = false;
        let currentPurchasedUrl = "";
        let currentPurchasedTitle = "";
        let digitalBooks = []; 

        try {
            Pi.init({ version: "2.0", sandbox: true });
        } catch(e) {
            console.error("فشلت التهيئة المبدئية:", e);
        }

        // دالة جلب الكتب ديناميكياً من ملفك المنفصل books.json
        async function fetchLibraryBooks() {
            try {
                const response = await fetch('./books.json');
                digitalBooks = await response.json();
                
                const container = document.getElementById('books-container');
                container.innerHTML = ''; 

                digitalBooks.forEach(book => {
                    container.innerHTML += `
                        <div class="book-card" onclick="startPurchase(${book.id}, ${book.amount}, '${book.title}')">
                            <span class="book-icon">${book.icon}</span>
                            <span class="book-name">${book.title}</span>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("فشل قراءة ملف books.json المرفق:", err);
            }
        }

        function onIncompletePaymentFound(payment) {
            return fetch('/api/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    paymentId: payment.identifier, 
                    txid: payment.transaction.txid 
                })
            })
            .then(res => res.json())
            .catch(err => console.error("فشل إغلاق المعاملة المعلقة:", err));
        }

        function authenticateUser() {
            if (isUserAuthenticated) return;

            const statusBar = document.getElementById('auth-status-bar');
            statusBar.className = "status-bar"; 
            document.getElementById('status-text').innerText = "جاري فحص الاتصال بالحساب...";

            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
            .then(function(auth) {
                isUserAuthenticated = true;
                statusBar.className = "status-bar connected"; 
                document.getElementById('status-text').innerText = "متصل بنجاح: " + auth.user.username;
                fetchLibraryBooks(); // بناء شبكة الكتب فور الاتصال الناجح
            })
            .catch(function(error) {
                console.error("خطأ الاتصال الخارجي:", error);
                statusBar.className = "status-bar failed"; 
                document.getElementById('status-text').innerText = "فشل الاتصال: اضغط هنا لإعادة المحاولة يدويًا";
            });
        }

        window.onload = function() {
            setTimeout(authenticateUser, 1000);
        };

        function startPurchase(bookId, amount, bookTitle) {
            if (!isUserAuthenticated) {
                alert("يرجى النقر على شريط الحالة العلوي للاتصال بشبكة Pi أولاً.");
                return;
            }

            document.getElementById('status-text').innerText = "جاري معالجة نافذة الدفع...";

            Pi.createPayment({
                amount: amount,
                memo: "شراء وتصفح " + bookTitle,
                metadata: { bookId: bookId }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    fetch('/api/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId })
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    fetch('/api/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('status-text').innerText = "متصل بنجاح";
                        
                        // استخراج رابط الكتاب الحقيقي من ملف books.json المخزن برمجياً
                        const purchasedBook = digitalBooks.find(b => b.id === bookId);
                        if (purchasedBook) {
                            currentPurchasedUrl = purchasedBook.download_url;
                            currentPurchasedTitle = bookTitle;
                            document.getElementById('success-modal').style.display = 'flex';
                        } else {
                            alert("خطأ: لم يتم العثور على رابط الكتاب في قاعدة البيانات.");
                        }
                    });
                },
                onCancel: function(paymentId) {
                    document.getElementById('status-text').innerText = "تم إلغاء الدفع المالي.";
                },
                onError: function(error, payment) {
                    alert("انتهت مهلة الطلب أو حدث خطأ: " + error.message);
                    authenticateUser(); 
                }
            });
        }

        document.getElementById('btn-read-now').addEventListener('click', function() {
            if(currentPurchasedUrl) {
                // نقل التوجيه لصفحة العرض مع تمرير الرابط الخارجي النظيف
                window.location.href = "/viewer.html?file=" + encodeURIComponent(currentPurchasedUrl) + "&title=" + encodeURIComponent(currentPurchasedTitle);
            }
        });
    </script>
</body>
</html>
