<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة باي الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0b0f19; color: #f1f5f9; }
        .success-animation { animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scaleUp { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-[#0b0f19] to-[#1e1b4b] p-4 pb-12">
    
    <!-- الهيدر الاحترافي -->
    <header class="max-w-2xl mx-auto text-center my-6">
        <div class="inline-block bg-yellow-500/10 text-yellow-500 p-3 rounded-full mb-2 border border-yellow-500/20">
            📚
        </div>
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-200">
            مكتبة باي الرقمية
        </h1>
        <p class="text-xs text-gray-400 mt-1">تصفح واشترِ كتبك المفضلة بعملة Pi بأمان</p>
    </header>
    
    <!-- حالة الاتصال -->
    <div class="max-w-xl mx-auto mb-8">
        <div id="authStatus" class="text-center p-3.5 rounded-xl text-sm bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 font-medium shadow-lg shadow-black/30 animate-pulse">
            🔄 جاري تهيئة النظام والاتصال بمحفظة باي...
        </div>
    </div>

    <!-- شبكة الكتب المتطورة -->
    <main class="max-w-2xl mx-auto">
        <div id="booksGrid" class="grid grid-cols-2 sm:grid-cols-2 gap-4"></div>
    </main>

    <!-- نافذة تفاصيل الكتاب -->
    <div id="bookModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-50 transition-all duration-300">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl w-full max-w-sm text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-yellow-500 to-amber-500"></div>
            <div id="modalIcon" class="text-5xl my-4"></div>
            <h2 id="modalTitle" class="text-xl font-bold text-white mb-1"></h2>
            <p id="modalAuthor" class="text-sm text-gray-400 mb-6"></p>
            
            <div class="bg-slate-950 p-3 rounded-xl mb-6 border border-slate-800/80 flex justify-between items-center px-4">
                <span class="text-xs text-gray-400">السعر الثابت:</span>
                <span class="font-bold text-yellow-400 text-lg">0.1 Pi</span>
            </div>

            <button id="buyButton" class="w-full bg-gradient-to-r from-yellow-500 to-amber-500 text-slate-950 font-bold py-3.5 rounded-xl mb-2 hover:from-yellow-400 hover:to-amber-400 transition shadow-lg shadow-yellow-500/10 active:scale-95 duration-150">
                شراء وتحميل فوراً
            </button>
            <button onclick="closeModal()" class="w-full text-gray-400 text-sm py-2 hover:text-white transition">إلغاء الأمر</button>
        </div>
    </div>

    <!-- نافذة النجاح المربعة الاحترافية بديلة الـ Alert -->
    <div id="successModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-950 border border-emerald-500/30 p-6 rounded-2xl w-full max-w-xs text-center shadow-2xl success-animation">
            <!-- علامة الصح الأخضر المطور -->
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-emerald-500/10 border-2 border-emerald-500 mb-4 shadow-lg shadow-emerald-500/10">
                <svg class="h-8 w-8 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-white mb-2">نجاح العملية</h3>
            <p class="text-sm text-gray-300 mb-6 leading-relaxed">🎉 تمت العملية بنجاح تام!<br>تم تأكيد وشراء الكتاب بنجاح عبر شبكة باي.</p>
            <button onclick="closeSuccessModal()" class="w-full bg-emerald-600 text-white font-medium py-2.5 rounded-xl hover:bg-emerald-500 transition shadow-lg shadow-emerald-600/20">
                ممتاز
            </button>
        </div>
    </div>

    <script>
        const books = [
            { id: 1, title: "الرحيق المختوم", author: "صفي الرحمن", icon: "🕌" },
            { id: 2, title: "مقدمة ابن خلدون", author: "ابن خلدون", icon: "🏛️" },
            { id: 3, title: "ثروة الأمم", author: "آدم سميث", icon: "📈" },
            { id: 4, title: "الخيميائي", author: "باولو كويلو", icon: "✨" },
            { id: 5, title: "شيفرة دافنشي", author: "دان براون", icon: "🕵️" },
            { id: 6, title: "تاريخ موجز للزمن", author: "ستيفن هوكينغ", icon: "🔬" },
            { id: 7, title: "الكون", author: "كارل ساغان", icon: "🌌" },
            { id: 8, title: "عشرون ألف فرسخ", author: "جول فيرن", icon: "🌊" },
            { id: 9, title: "جدد حياتك", author: "محمد الغزالي", icon: "📖" },
            { id: 10, title: "الاقتصاد العجيب", author: "ستيفن ليفيت", icon: "📊" }
        ];

        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            if (grid) {
                grid.innerHTML = books.map(book => `
                    <div onclick="openModal(${book.id})" class="bg-slate-900/60 backdrop-blur-sm border border-slate-800 p-5 rounded-2xl text-center cursor-pointer hover:border-yellow-500/40 hover:bg-slate-800/40 transition-all duration-300 group shadow-md shadow-black/10">
                        <div class="text-4xl mb-3 group-hover:scale-110 transition duration-300">${book.icon}</div>
                        <p class="font-bold text-sm text-slate-200 group-hover:text-yellow-400 transition mb-1 truncate">${book.title}</p>
                        <p class="text-xs text-slate-500 truncate">${book.author}</p>
                    </div>
                `).join('');
            }
        }

        const onIncompletePaymentFound = (payment) => {
            console.log("تم العثور على دفعة معلقة، جاري معالجتها:", payment);
            return fetch('/api/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
            }).then(res => {
                if (!res.ok) throw new Error("فشل إغلاق المعلقة");
            });
        };

        async function startPiIntegration() {
            const statusDiv = document.getElementById('authStatus');
            await new Promise(resolve => setTimeout(resolve, 600));

            if (!window.Pi) {
                statusDiv.innerText = "🔴 خطأ: لم يتم العثور على Pi SDK.";
                statusDiv.className = "text-center p-3.5 rounded-xl text-sm bg-red-950/40 text-red-400 border border-red-900/50 font-bold shadow-lg";
                return;
            }

            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
                
                statusDiv.innerText = `🟢 متصل بالشبكة: ${auth.user.username}`;
                statusDiv.className = "text-center p-3.5 rounded-xl text-sm bg-emerald-950/40 text-emerald-400 border border-emerald-900/40 font-bold shadow-lg shadow-black/30";
            } catch (error) {
                statusDiv.innerText = `🔴 فشل الربط: ${error.message || error}`;
                statusDiv.className = "text-center p-3.5 rounded-xl text-sm bg-red-950/40 text-red-400 border border-red-900/50 font-bold shadow-lg";
            }
        }

        function openModal(id) {
            const book = books.find(b => b.id === id);
            document.getElementById('modalTitle').innerText = book.title;
            document.getElementById('modalAuthor').innerText = book.author;
            document.getElementById('modalIcon').innerText = book.icon;
            
            document.getElementById('buyButton').onclick = async () => {
                try {
                    await window.Pi.createPayment({
                        amount: 0.1,
                        memo: "شراء كتاب: " + book.title,
                        metadata: { bookId: id }
                    }, {
                        onReadyForServerApproval: (paymentId) => {
                            return fetch('/api/approve', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId })
                            }).then(async res => {
                                if (!res.ok) throw new Error("فشل الموافقة");
                            });
                        },
                        onReadyForServerCompletion: (paymentId, txid) => {
                            return fetch('/api/complete', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId, txid })
                            }).then(async res => {
                                if (!res.ok) throw new Error("فشل التأكيد");
                                closeModal();
                                openSuccessModal(); // استدعاء المربع الاحترافي بدلاً من الـ alert
                            });
                        },
                        onCancel: () => {},
                        onError: (error) => console.error(error)
                    });
                } catch (e) { 
                    console.error(e);
                }
            };
            document.getElementById('bookModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('bookModal').classList.add('hidden'); }
        
        function openSuccessModal() { document.getElementById('successModal').classList.remove('hidden'); }
        function  closeSuccessModal() { document.getElementById('successModal').classList.add('hidden'); }
        
        window.onload = () => {
            renderBooks();
            startPiIntegration();
        };
    </script>
</body>
</html>
