<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الرقمية - متجر الكتب</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        :root {
            --pi-color: #f1c40f;
            --primary-color: #1a5f7a;
            --bg-color: #f4f6f9;
        }
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        
        /* تصميم كرت الكتاب */
        .book-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .book-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .book-price { color: #e67e22; font-weight: bold; font-size: 18px; margin-bottom: 15px; }
        
        /* زر الشراء عملة Pi */
        .btn-pi-pay {
            background-color: var(--pi-color);
            color: #2c3e50;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            width: 100%;
            transition: background 0.2s;
        }
        .btn-pi-pay:hover { background-color: #f39c12; }
        
        #status-message { margin-top: 20px; color: #7f8c8d; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>المكتبة الرقمية</h1>
        <p class="subtitle">اشترِ كتبك المفضلة باستخدام عملة Pi</p>

        <div class="book-card">
            <div class="book-title">كتاب الرحيق المختوم</div>
            <div class="book-price">1 Pi</div>
            <button class="btn-pi-pay" onclick="payWithPi('raheeq', 1.0, 'شراء كتاب الرحيق المختوم')">
                ⚡ الشراء بواسطة Pi
            </button>
        </div>

        <div id="status-message">جاهز للطلب...</div>
    </div>

    <script>
        // 2. تهيئة الـ Pi SDK فور تحميل الصفحة
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true }); // اجعل sandbox: false عند إطلاق التطبيق الحقيقي للعامة

        // دالة بدء عملية الدفع عند ضغط المستخدم على زر الشراء
        function payWithPi(bookId, amount, memoDescription) {
            document.getElementById('status-message').innerText = "جاري فتح محفظة Pi...";

            // إنشاء عملية دفع رسمية عبر متصفح Pi
            Pi.createPayment({
                amount: amount,
                memo: memoDescription,
                metadata: { bookId: bookId }
            }, {
                // الخطوة أ: عند إنشاء الطلب بنجاح، نرسل الـ paymentId إلى السيرفر الخاص بك لتسجيله
                onReadyForServerApproval: function(paymentId) {
                    document.getElementById('status-message').innerText = "جاري مراجعة الطلب من السيرفر...";
                    
                    // إرسال الـ paymentId إلى ملف الخلفية api/index.js لتأكيده مع Pi Servers
                    fetch('/api/approve-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId })
                    })
                    .then(res => res.json())
                    .then(data => {
                        console.log("تمت موافقة السيرفر المبدئية بنجاح");
                    });
                },
                
                // الخطوة ب: بعد موافقة السيرفر، يقوم المستخدم بوضع كلماته السرية في محفظته ويتم الخصم
                onReadyForServerCompletion: function(paymentId, txid) {
                    document.getElementById('status-message').innerText = "جاري إتمام العملية ونقل الأموال...";
                    
                    // إرسال التوكيد النهائي للسيرفر لتسليم الكتاب
                    fetch('/api/complete-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('status-message').innerText = "تم الدفع بنجاح! جاري فتح الكتاب...";
                        
                        // الروابط الديناميكية التي تفتح الملف الآخر المنفصل
                        const bookUrl = "https://yourdomain.com/path_to/raheeq.pdf"; // رابط الـ PDF الفعلي على خادمك
                        const bookTitle = "كتاب الرحيق المختوم";
                        
                        // الانتقال الفوري لملف المستعرض المنفصل وتمرير بيانات الكتاب له عبر الرابط
                        window.location.href = `/viewer.html?file=${encodeURIComponent(bookUrl)}&title=${encodeURIComponent(bookTitle)}`;
                    });
                },
                
                // في حال إلغاء المستخدم للعملية
                onCancel: function(paymentId) {
                    document.getElementById('status-message').innerText = "تم إلغاء عملية الدفع بواسطة المستخدم.";
                },
                
                // في حال حدوث أي خطأ غير متوقع بالشبكة
                onError: function(error, payment) {
                    document.getElementById('status-message').innerText = "حدث خطأ أثناء الدفع: " + error.message;
                }
            });
        }
    </script>
</body>
</html>
